<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login | Nelli Constructions</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 30px;
            background: #2a4365;
            border-radius: 8px;
            color: white;
            text-align: center;
        }
        .login-container input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            border: none;
        }
        .error-message { color: #fc8181; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Admin Login</h2>
        
        {% if error %}
            <p class="error-message">{{ error }}</p>
        {% endif %}
        
        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit" class="btn-primary" style="width: 95%; margin-top: 15px;">Login</button>
        </form>
        <br>
        <a href="/" style="color: #cbd5e0; text-decoration: none;">&larr; Back to Public Homepage</a>
    </div>
</body>
</html>
